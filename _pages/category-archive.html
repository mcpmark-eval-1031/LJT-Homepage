---
layout: archive
title: "Category Archive"
permalink: /categories/
author_profile: true
---

{% include base_path %}

<h1>Categories</h1>

{% for category in site.categories %}
  <h2>{{ category[0] }}</h2>
  <ul>
    {% for post in category[1] %}
      <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
{% endfor %}

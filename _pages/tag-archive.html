---
layout: archive
title: "Tag Archive"
permalink: /tags/
author_profile: true
---

{% include base_path %}

<h1>Tags</h1>

{% for tag in site.tags %}
  <h2>{{ tag[0] }}</h2>
  <ul>
    {% for post in tag[1] limit:5 %}
      <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
{% endfor %}
